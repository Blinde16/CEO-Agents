version: "3.9"

# CEO-Agents — full stack with Postgres persistence and n8n workflow automation
#
# Quick start:
#   cp backend/.env.example backend/.env   # fill in your keys
#   docker compose up
#
# Services:
#   postgres   — persistent store (port 5432)
#   n8n        — workflow automation UI (port 5678)  http://localhost:5678
#   backend    — FastAPI API (port 8000)             http://localhost:8000/docs
#   frontend   — Next.js chat UI (port 3000)         http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ceo_agents
      POSTGRES_USER: ceo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ceopassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceo -d ceo_agents"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-in-production}
      # Pre-load workflow templates from the n8n/workflows directory
      N8N_IMPORT_WORKFLOW: /home/node/.n8n/import
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ceo:${POSTGRES_PASSWORD:-ceopassword}@postgres:5432/ceo_agents
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_MODEL_HEAVY: ${OPENAI_MODEL_HEAVY:-gpt-4.1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/integrations/google/callback}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  n8n_data:
