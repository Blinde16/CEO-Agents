services:
  postgres:
    image: postgres:16
    container_name: ceo-agents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ceo_agents
      POSTGRES_USER: ceo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ceopassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceo -d ceo_agents"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:1.84.1
    container_name: ceo-agents-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_PORT: 5678
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-in-production}
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: America/Denver
      TZ: America/Denver
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
